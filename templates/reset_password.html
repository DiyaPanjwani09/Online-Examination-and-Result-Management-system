<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Exam Portal</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 10s infinite ease-in-out alternate;
    }
    .blob-1 { width:400px; height:400px; background:#6366f1; top:-100px; left:-100px; }
    .blob-2 { width:350px; height:350px; background:#a855f7; bottom:-80px; right:-80px; animation-direction: alternate-reverse; }

    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px, 30px); } }

    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      padding: 44px 40px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      color: white;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .icon { text-align: center; font-size: 44px; margin-bottom: 10px; }

    h2 {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(to right, #fff, #c7d2fe);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .flash {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 16px;
    }
    .danger  { background: rgba(239,68,68,0.2);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .success { background: rgba(34,197,94,0.2);  color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }

    .form-group { margin-bottom: 20px; position: relative; }

    label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 7px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 13px 46px 13px 16px;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    input::placeholder { color: #475569; }
    input:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 4px rgba(129,140,248,0.15);
    }

    .toggle-eye {
      position: absolute;
      right: 14px;
      bottom: 14px;
      cursor: pointer;
      font-size: 16px;
      color: #64748b;
      user-select: none;
    }
    .toggle-eye:hover { color: #94a3b8; }

    /* Password strength bar */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: #1e293b;
      margin-top: 8px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 6px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(99,102,241,0.45);
    }
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="icon">🔒</div>
    <h2>Set New Password</h2>
    <p class="subtitle">Choose a strong password for your account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/reset-password">

      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="password" id="new-pass" placeholder="Minimum 6 characters" required>
        <span class="toggle-eye" onclick="toggleVis('new-pass', this)">👁</span>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm-pass" placeholder="Re-enter password" required>
        <span class="toggle-eye" onclick="toggleVis('confirm-pass', this)">👁</span>
      </div>

      <button type="submit" class="btn">Reset Password</button>
    </form>
  </div>

  <script>
    function toggleVis(id, icon) {
      const el = document.getElementById(id);
      if (el.type === 'password') {
        el.type = 'text';
        icon.textContent = '🙈';
      } else {
        el.type = 'password';
        icon.textContent = '👁';
      }
    }

    // Simple strength indicator
    document.getElementById('new-pass').addEventListener('input', function () {
      const val = this.value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { w:'0%',   c:'transparent', t:'' },
        { w:'25%',  c:'#ef4444',     t:'Very Weak' },
        { w:'50%',  c:'#f97316',     t:'Weak' },
        { w:'75%',  c:'#eab308',     t:'Good' },
        { w:'90%',  c:'#22c55e',     t:'Strong' },
        { w:'100%', c:'#10b981',     t:'Very Strong' },
      ];
      const lvl = levels[Math.min(score, 5)];
      fill.style.width      = lvl.w;
      fill.style.background = lvl.c;
      label.textContent     = lvl.t;
      label.style.color     = lvl.c;
    });
  </script>
</body>
</html>
