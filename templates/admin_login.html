<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Terminal | Secure Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #c084fc;
        --primary-glow: rgba(192, 132, 252, 0.3);
        --bg-dark: #09090b;
        --card-bg: rgba(24, 24, 27, 0.8);
        --text-main: #fafafa;
        --text-dim: #a1a1aa;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    /* Gradient Blobs */
    .blob {
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
        filter: blur(80px);
        z-index: 0;
    }

    .blob-1 { top: -100px; left: -100px; }
    .blob-2 { bottom: -100px; right: -100px; }

    .login-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }

    .login-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .header {
        text-align: center;
        margin-bottom: 40px;
    }

    .logo-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #c084fc, #8b5cf6);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        box-shadow: 0 0 20px var(--primary-glow);
    }

    .title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
    }

    .subtitle {
        color: var(--text-dim);
        font-size: 14px;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-dim);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-wrapper {
        position: relative;
    }

    .input-field {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 14px 16px;
        color: #fff;
        font-size: 15px;
        transition: all 0.2s;
    }

    .input-field:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px var(--primary-glow);
    }

    .btn-login {
        width: 100%;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 10px;
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-login:active {
        transform: translateY(0);
    }

    .flash-messages {
        margin-bottom: 24px;
    }

    .flash {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 12px;
        border: 1px solid transparent;
    }

    .flash-danger {
        background: rgba(239, 68, 68, 0.1);
        border-color: rgba(239, 68, 68, 0.2);
        color: #f87171;
    }

    .flash-info {
        background: rgba(59, 130, 246, 0.1);
        border-color: rgba(59, 130, 246, 0.2);
        color: #60a5fa;
    }

    .footer-links {
        margin-top: 32px;
        text-align: center;
    }

    .link {
        color: var(--text-dim);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
    }

    .link:hover {
        color: var(--primary);
    }

    /* Animation */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .login-card {
        animation: fadeInUp 0.6s ease-out forwards;
    }
</style>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="login-container">
    <div class="login-card">
        <div class="header">
            <div class="logo-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h1 class="title">Admin Access</h1>
            <p class="subtitle">Secure authentication required</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label class="label">Username</label>
                <div class="input-wrapper">
                    <input type="text" name="username" class="input-field" placeholder="Administrative ID" required>
                </div>
            </div>
            <div class="form-group">
                <label class="label">Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="input-field" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="footer-links">
            <a href="{{ url_for('auth_bp.student_login') }}" class="link">Return to Portal</a>
        </div>
    </div>
</div>


<!-- Dark/Light Mode Toggle Button -->
<button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()" title="Switch to Light Mode">🌙</button>
<script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
