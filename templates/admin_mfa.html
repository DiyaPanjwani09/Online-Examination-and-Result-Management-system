<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification | Multi-Factor Auth</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #c084fc;
        --primary-glow: rgba(192, 132, 252, 0.3);
        --bg-dark: #09090b;
        --card-bg: rgba(24, 24, 27, 0.8);
        --text-main: #fafafa;
        --text-dim: #a1a1aa;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    .blob {
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
        filter: blur(80px);
        z-index: 0;
    }

    .blob-1 { top: -100px; left: -100px; }
    .blob-2 { bottom: -100px; right: -100px; }

    .login-container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }

    .login-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
    }

    .header {
        margin-bottom: 32px;
    }

    .verification-icon {
        width: 64px;
        height: 64px;
        background: rgba(192, 132, 252, 0.1);
        border: 1px solid var(--primary);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        color: var(--primary);
    }

    .title {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
    }

    .subtitle {
        color: var(--text-dim);
        font-size: 14px;
        line-height: 1.6;
    }

    .email-display {
        color: #fff;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.05);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 13px;
        margin: 0 2px;
    }

    .otp-input-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 32px 0;
    }

    .otp-digit {
        width: 48px;
        height: 56px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        color: #fff;
        transition: all 0.2s;
    }

    .otp-digit:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-glow);
        background: rgba(255, 255, 255, 0.08);
    }

    .btn-verify {
        width: 100%;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-verify:hover {
        background: #a855f7;
        box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
    }

    .flash-messages {
        margin-bottom: 24px;
    }

    .flash {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        margin-bottom: 12px;
    }

    .flash-danger { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .flash-info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }

    .resend {
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-dim);
    }

    .resend a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
    }

    /* Animation */
    @keyframes bounceIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    .login-card {
        animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
</style>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="login-container">
    <div class="login-card">
        <div class="header">
            <div class="verification-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <h1 class="title">Verify Identity</h1>
            <p class="subtitle">Enter the 6-digit code sent to <br><span class="email-display">{{ email }}</span></p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" id="mfa-form">
            <input type="hidden" name="otp" id="final-otp">
            <div class="otp-input-group">
                <input type="text" maxlength="1" class="otp-digit" required autofocus>
                <input type="text" maxlength="1" class="otp-digit" required>
                <input type="text" maxlength="1" class="otp-digit" required>
                <input type="text" maxlength="1" class="otp-digit" required>
                <input type="text" maxlength="1" class="otp-digit" required>
                <input type="text" maxlength="1" class="otp-digit" required>
            </div>
            <button type="submit" class="btn-verify">Authenticate</button>
        </form>

        <div class="resend">
            Didn't receive code? <a href="#">Resend Code</a>
        </div>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.otp-digit');
    const form = document.getElementById('mfa-form');
    const finalOtp = document.getElementById('final-otp');

    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length > 1) {
                e.target.value = e.target.value.slice(0, 1);
            }
            if (e.target.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    form.addEventListener('submit', (e) => {
        let otp = '';
        inputs.forEach(input => otp += input.value);
        finalOtp.value = otp;
    });
</script>


<!-- Dark/Light Mode Toggle Button -->
<button id="theme-toggle-btn" class="theme-toggle" onclick="toggleTheme()" title="Switch to Light Mode">🌙</button>
<script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
